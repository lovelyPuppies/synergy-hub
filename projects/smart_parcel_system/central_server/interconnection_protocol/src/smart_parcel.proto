// gRPC 를 사용하지 않기 때문에, 해당 요청에 대해서 자동으로 코드를 만들 수 없다. c 에서는 어떻게 해야하지?..

message Request {
  string source = 1;
  string destination = 2;
  string command = 3;
  map<string, string> payload = 4;
  // string status = 5;
  // repeated Link links = 6;
}


// ❔ Naming Convention
//    Request: <resource>/<action>
// 

message Elevator {
  uint32 id = 1;
  Status status = 2;

  enum DoorOpenStatus {
    CLOSED = 0;
    OPEN = 1;
  }

  message Status {
    string current_floor = 1;
    DoorOpenStatus door_open_status = 2;
  }
}

// command: set, ack, send, ... 📰
// 🚗
message DeliveryRobot {
  uint32 id = 1;
  Status status = 2;

  enum DeliveryStatus {
    READY = 0;
    BUSY = 1;
    COMPLETE = 2;
  }

  message Status {
    DeliveryStatus status = 2;
  }
}


message Storage {
  uint32 id = 1;
  repeated Locker lockers = 2;

  message Locker {
    uint32 locker_id = 1;
    string access_code = 2;
    uint32 parcel_id = 3;
  }
}

// 택배보관소와, 집 주소
